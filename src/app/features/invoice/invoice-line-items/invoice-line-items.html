<div class="line-items-container">
  <p-table 
    [value]="items().controls" 
    [scrollable]="true" 
    scrollHeight="flex" 
    styleClass="p-datatable-sm p-datatable-striped" 
    [tableStyle]="{'min-width': '50rem'}">
    
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 50px">Sl.No</th>
        <th>Item Code</th>
        <th>Description</th>
        <th>Unit</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Amount</th>
        <th>Expense</th> <!-- New Feature -->
        <th style="width: 50px"></th>
      </tr>
      <!-- Empty space or filter row if needed -->
    </ng-template>

    <ng-template pTemplate="body" let-control let-i="rowIndex">
      <tr [formGroup]="control">
        <td>{{ i + 1 }}</td>
        
        <td>
          <p-select 
            [options]="(itemList$ | async) || []" 
            formControlName="itemCode" 
            optionLabel="code" 
            optionValue="code"
            [filter]="true"
            placeholder="Select Item"
            appendTo="body"
            (onChange)="onItemSelection($event.value, i)">
            
            <ng-template let-item pTemplate="item">
              <div>{{ item.code }} - {{ item.description }}</div>
            </ng-template>
          </p-select>
        </td>

        <td>
          <input pInputText type="text" formControlName="description" class="w-full"/>
        </td>

        <td>
          <input pInputText type="text" formControlName="unit" class="w-full"/>
        </td>

        <td>
          <p-inputNumber 
            inputId="quantity" 
            formControlName="quantity" 
            mode="decimal" 
            [minFractionDigits]="0" 
            [maxFractionDigits]="2"
            (onInput)="updateAmount(i)"></p-inputNumber>
        </td>

        <td>
          <p-inputNumber 
            inputId="price" 
            formControlName="price" 
            mode="decimal" 
            [minFractionDigits]="2" 
            [maxFractionDigits]="2"
            (onInput)="updateAmount(i)"></p-inputNumber>
        </td>

        <td>
          <!-- Read-only Amount -->
          <p-inputNumber 
            inputId="amount" 
            formControlName="amount" 
            mode="decimal" 
            [minFractionDigits]="2" 
            [maxFractionDigits]="2"
            [readonly]="true"></p-inputNumber>
        </td>

        <td>
          <!-- New Feature: Read-only proportional Expense -->
          <p-inputNumber 
            inputId="expense" 
            formControlName="expense" 
            mode="decimal" 
            [minFractionDigits]="2" 
            [maxFractionDigits]="2"
            [readonly]="true"
            class="expense-field"></p-inputNumber>
        </td>
        
        <td>
          <p-button icon="pi pi-trash" [text]="true" severity="danger" (click)="onRemoveRow(i)"></p-button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="footer">
      <tr>
        <td colspan="9">
          <p-button label="Add New Row" icon="pi pi-plus" [text]="true" (click)="onAddRow()"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
