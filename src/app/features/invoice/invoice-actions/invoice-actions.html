<div class="actions-container">
  <div class="left-actions">
    <p-button label="Save" icon="pi pi-save" (click)="save.emit()" severity="success" class="action-button"></p-button>
    <p-button label="Clear" icon="pi pi-file-excel" (click)="clear.emit()" [outlined]="true" severity="secondary" class="action-button"></p-button>
    
    <p-button label="Void" icon="pi pi-times-circle" [outlined]="true" severity="secondary" [disabled]="true" class="action-button"></p-button>
    
    <p-button label="Delete" icon="pi pi-trash" [outlined]="true" severity="danger" class="action-button"></p-button>
  </div>
  
  <div class="right-actions">
    <p-button label="Close" icon="pi pi-times" [outlined]="true" severity="secondary" (click)="onClose()" class="action-button"></p-button>
  </div>
</div>
