<div class="header-grid" [formGroup]="form()">

  <div class="col-start-1 label-col blue-label">Doc ID:</div>
  <div class="col-start-2 input-col">
    <p-select class="w-full" styleClass="w-full" inputId="docId" name="docId" formControlName="docId"
      [options]="[{label: 'IMPI', value: 'IMPI'}]" optionLabel="label" optionValue="value" appendTo="body"></p-select>
  </div>

  <div class="col-start-3 label-col blue-label">Voucher Number:</div>
  <div class="col-start-4 input-col">
    <input class="w-full" pInputText id="voucherNumber" name="voucherNumber" formControlName="voucherNumber" />
  </div>

  <div class="col-start-5 empty-spacer"></div>

  <div class="col-start-6 label-col font-bold">Date:</div>
  <div class="col-start-7 input-col flex">
    <p-datepicker class="w-full flex-1" styleClass="w-full" inputId="date" name="date" formControlName="date"
      dateFormat="mm/dd/yy" [showIcon]="true" [selectOtherMonths]="true" appendTo="body" class="date-input">
    </p-datepicker>
  </div>

  <div class="col-start-1 label-col blue-label">Vendor ID:</div>
  <div class="col-start-2 input-col">
    <p-select class="w-full" styleClass="w-full" inputId="vendorId" name="vendorId" formControlName="vendorId"
      [options]="(vendors$ | async) || []" optionLabel="id" optionValue="id" [filter]="true" appendTo="body"></p-select>
  </div>

  <div class="col-start-3 span-2 input-col">
    <input class="w-full" pInputText id="vendorName" name="vendorName" formControlName="vendorName" />
  </div>

  <div class="col-start-5 empty-spacer"></div>

  <div class="col-start-6 label-col">Reference:</div>
  <div class="col-start-7 input-col">
    <input class="w-full" pInputText id="reference" name="reference" formControlName="reference" />
  </div>

  <div class="col-start-1 label-col blue-label">Buyer:</div>
  <div class="col-start-2 input-col">
    <p-select class="w-full" styleClass="w-full" inputId="buyer" name="buyer" formControlName="buyer"
      [options]="(buyers$ | async) || []" appendTo="body"></p-select>
  </div>

  <div class="col-start-3 label-col blue-label">Shipping Method:</div>
  <div class="col-start-4 input-col">
    <p-select class="w-full" styleClass="w-full" inputId="shippingMethod" name="shippingMethod"
      formControlName="shippingMethod" [options]="(methods$ | async) || []" appendTo="body"></p-select>
  </div>

  <div class="col-start-5 empty-spacer"></div>

  <div class="col-start-6 label-col">Reference 2:</div>
  <div class="col-start-7 input-col">
    <input class="w-full" pInputText id="reference2" name="reference2" formControlName="reference2" />
  </div>

  <div class="col-start-1 label-col blue-label">Payment Term:</div>
  <div class="col-start-2 input-col">
    <p-select class="w-full" styleClass="w-full" inputId="paymentTerm" name="paymentTerm" formControlName="paymentTerm"
      [options]="(terms$ | async) || []" appendTo="body"></p-select>
  </div>

  <div class="col-start-3 label-col blue-label">Tax Group:</div>
  <div class="col-start-4 input-col">
    <p-select class="w-full" styleClass="w-full" inputId="taxGroup" name="taxGroup" formControlName="taxGroup"
      [options]="(taxGroups$ | async) || []" optionLabel="code" optionValue="code" appendTo="body"></p-select>
  </div>

  <div class="col-start-5 empty-spacer"></div>

  <div class="col-start-6 label-col blue-label">Currency:</div>
  <div class="col-start-7 input-col currency-group flex">
    <p-select class="flex-1 w-full" styleClass="w-full" inputId="currency" name="currency" formControlName="currency"
      [options]="(currencies$ | async) || []" optionLabel="code" optionValue="code" appendTo="body"></p-select>
    <div class="currency-rate-box ml-2 flex items-center">
      <span>R:{{ form().get('exchangeRate')?.value | number:'1.2-2' }}</span>
    </div>
  </div>

  <div class="col-start-6 label-col font-bold">Due Date:</div>
  <div class="col-start-7 input-col flex">
    <p-datepicker class="w-full flex-1" styleClass="w-full" inputId="dueDate" name="dueDate" formControlName="dueDate"
      dateFormat="mm/dd/yy" [showIcon]="true" [selectOtherMonths]="true" appendTo="body" class="date-input">
    </p-datepicker>
  </div>

  <div class="col-start-6 label-col">Vendor Ref #:</div>
  <div class="col-start-7 input-col">
    <input class="w-full" pInputText id="vendorRef" name="vendorRef" formControlName="vendorRef" />
  </div>

</div>
