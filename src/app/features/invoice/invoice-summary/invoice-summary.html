<div class="summary-card" [formGroup]="form()">

  <div class="summary-row">
    <span class="mock-label">Subtotal:</span>
    <div id="subtotal" class="value-box">{{ form().get('subtotal')?.value | number:'1.2-2' }}</div>
  </div>

  <div class="summary-row">
    <label for="discountPercent">Discount:</label>
    <div class="discount-inputs">
      <div class="input-wrapper percent-wrapper">
        <p-inputNumber inputId="discountPercent" name="discountPercent" formControlName="discountPercent" [min]="0"
          [max]="100" [maxFractionDigits]="2" (onFocus)="onFocusInput('discountPercent')"
          (onBlur)="onBlurInput('discountPercent')"></p-inputNumber>
      </div>
      <span class="percent-sign">%</span>
      <div class="input-wrapper amount-wrapper">
        <p-inputNumber inputId="discountAmount" name="discountAmount" formControlName="discountAmount" mode="decimal"
          [minFractionDigits]="2" [maxFractionDigits]="2" (onFocus)="onFocusInput('discountAmount')"
          (onBlur)="onBlurInput('discountAmount')"></p-inputNumber>
      </div>
    </div>
  </div>

  <div class="summary-row">
    <label class="blue-label" for="tax">Tax:</label>
    <div class="input-wrapper amount-wrapper">
      <p-inputNumber inputId="tax" name="tax" formControlName="tax" mode="decimal" [minFractionDigits]="2"
        [maxFractionDigits]="2" (onFocus)="onFocusInput('tax')" (onBlur)="onBlurInput('tax')"></p-inputNumber>
    </div>
  </div>

  <div class="summary-row highlight-expense">
    <label for="totalExpense">Total Expense:</label>
    <div class="input-wrapper amount-wrapper expense-wrapper">
      <p-inputNumber inputId="totalExpense" name="totalExpense" formControlName="totalExpense" mode="decimal"
        [minFractionDigits]="2" [maxFractionDigits]="2" (onFocus)="onFocusInput('totalExpense')"
        (onBlur)="onBlurInput('totalExpense')"></p-inputNumber>
    </div>
  </div>

  <div class="summary-row total-row">
    <span class="mock-label">Total:</span>
    <div id="total" class="value-box total-box">{{ form().get('total')?.value | number:'1.2-2' }}</div>
  </div>

</div>
