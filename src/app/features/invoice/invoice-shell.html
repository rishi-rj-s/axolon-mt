<p-toast></p-toast>
<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>

<div class="invoice-layout">
  <div class="toolbar-wrapper">
    <app-invoice-toolbar></app-invoice-toolbar>
  </div>
  
  <div class="content-wrapper">
    <form [formGroup]="invoiceForm" class="invoice-form">
      <div class="header-section">
        <!-- Passes the header FormGroup slice down -->
        <app-invoice-header [form]="invoiceForm.controls.header"></app-invoice-header>
      </div>
      
      <div class="grid-section">
        <!-- Passes the lineItems FormArray slice down -->
        <app-invoice-line-items [items]="invoiceForm.controls.lineItems"></app-invoice-line-items>
      </div>
      
      <div class="bottom-section">
        <div class="notes-section">
          <label class="blue-label" for="note">Note:</label>
          <textarea pInputTextarea id="note" formControlName="note" [rows]="4" [autoResize]="false" class="w-full"></textarea>
        </div>
        
        <div class="summary-section">
          <!-- Passes the summary FormGroup slice down -->
          <app-invoice-summary [form]="invoiceForm.controls.summary"></app-invoice-summary>
        </div>
      </div>
      
    </form>
  </div>
  
  <div class="actions-wrapper">
    <app-invoice-actions (save)="onSave()" (clear)="onClear()"></app-invoice-actions>
  </div>
</div>
