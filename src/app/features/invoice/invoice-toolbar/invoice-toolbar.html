<p-toolbar styleClass="classic-toolbar p-0">
  <div class="p-toolbar-group-left flex align-items-center">
    
    <!-- Navigation Buttons -->
    <div class="toolbar-nav-group">
      <button class="tool-btn"><i class="pi pi-step-backward-alt"></i></button>
      <button class="tool-btn"><i class="pi pi-caret-left"></i></button>
      <button class="tool-btn"><i class="pi pi-caret-right"></i></button>
      <button class="tool-btn"><i class="pi pi-step-forward-alt"></i></button>
    </div>

    <div class="toolbar-divider"></div>
    
    <!-- List Icon -->
    <button class="tool-btn"><i class="pi pi-list"></i></button>
    
    <div class="toolbar-divider"></div>

    <!-- Quick Search Input -->
    <input type="text" pInputText class="quick-search-input" />

    <!-- Find Button -->
    <button class="tool-btn with-text">
      <i class="pi pi-search"></i>
      <span>Find</span>
    </button>

    <!-- Attach File Button -->
    <button class="tool-btn with-text">
      <i class="pi pi-paperclip" style="transform: rotate(45deg);"></i>
      <span>Attach File</span>
    </button>

    <!-- Message Bubble -->
    <button class="tool-btn"><i class="pi pi-comment"></i></button>

    <div class="toolbar-divider"></div>

    <!-- Print Icons -->
    <button class="tool-btn"><i class="pi pi-print"></i></button>
    <button class="tool-btn"><i class="pi pi-file-excel"></i></button> <!-- Or preview icon -->

    <div class="toolbar-divider"></div>

    <!-- Actions Dropdown -->
    <button class="tool-btn with-text dropdown">
      <i class="pi pi-file-edit"></i> <!-- Replace with info/list icon -->
      <span style="position: relative;">
        <i class="pi pi-info-circle tiny-info"></i>
      </span>
      <span>Actions <i class="pi pi-caret-down mini-caret"></i></span>
    </button>
  </div>
  
  <div class="p-toolbar-group-right">
    <!-- Settings Icon -->
    <button class="tool-btn"><i class="pi pi-cog"></i></button>
  </div>
</p-toolbar>
