<p-toolbar styleClass="classic-toolbar p-0">
  <div class="p-toolbar-group-left flex align-items-center">
    
    <!-- Navigation Buttons -->
    <div class="toolbar-nav-group">
      <button class="tool-btn"><i class="pi pi-step-backward-alt"></i></button>
      <button class="tool-btn"><i class="pi pi-angle-left"></i></button>
      <button class="tool-btn"><i class="pi pi-angle-right"></i></button>
      <button class="tool-btn"><i class="pi pi-step-forward-alt"></i></button>
    </div>
    <div class="toolbar-divider"></div>
    
    <!-- List Icon -->
    <button class="tool-btn"><i class="pi pi-list"></i></button>
    
    <div class="toolbar-divider"></div>

    <!-- Quick Search Input -->
    <input type="text" pInputText class="quick-search-input" />

    <div class="toolbar-divider"></div>

    <!-- Find Button -->
    <button class="tool-btn with-text">
      <i class="pi pi-search" style="font-size: 1.1rem;"></i>
      <span>Find</span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- Attach File Button -->
    <button class="tool-btn with-text">
      <i class="pi pi-paperclip" style="transform: rotate(45deg); font-size: 1.1rem;"></i>
      <span>Attach File</span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- Message Bubble -->
    <button class="tool-btn"><i class="pi pi-comment"></i></button>

    <div class="toolbar-divider"></div>

    <!-- Print Icon -->
    <button class="tool-btn with-dropdown">
      <i class="pi pi-print"></i>
      <i class="pi pi-caret-down mini-caret"></i>
    </button>

    <div class="toolbar-divider"></div>
      
    <!-- Print Preview Icon (Generic) -->
    <button class="tool-btn with-dropdown">
      <i class="pi pi-print"></i>
      <i class="pi pi-caret-down mini-caret"></i>
    </button>

    <div class="toolbar-divider"></div>

    <!-- New File -->
    <button class="tool-btn"><i class="pi pi-file"></i></button>

    <div class="toolbar-divider"></div>

    <!-- Actions Dropdown -->
    <button class="tool-btn with-text with-dropdown">
      <i class="pi pi-file-edit" style="font-size: 1.1rem"></i>
      <span style="margin-left: 6px;">Actions</span>
      <i class="pi pi-caret-down mini-caret" style="margin-left: 4px;"></i>
    </button>
  </div>
  
  <div class="p-toolbar-group-right">
    <!-- Settings Icon -->
    <button class="tool-btn"><i class="pi pi-cog"></i></button>
  </div>
</p-toolbar>
